<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section">

<h2>📊 Dashboard Overview</h2>
<div id="statsContainer" style="display:flex;gap:20px;flex-wrap:wrap;"></div>

<hr><br>

<h1>Admin Dashboard</h1>

<!-- NOTICE SECTION -->
<h2>📢 नवीन सूचना जोडा</h2>
<input type="text" id="noticeTitle" placeholder="सूचना शीर्षक">
<br><br>
<textarea id="noticeDesc" placeholder="सूचना तपशील"></textarea>
<br><br>
<input type="file" id="noticeFile" accept="application/pdf">
<br><br>
<button id="addNoticeBtn">Upload Notice</button>
<p id="noticeMsg"></p>

<hr><br>

<!-- COMPLAINT SECTION -->
<h2>📨 आलेल्या तक्रारी</h2>
<div id="complaintList"></div>

<hr><br>

<!-- GALLERY SECTION -->
<h2>🖼 Gallery Upload</h2>
<input type="file" id="imageFile">
<br><br>
<button id="uploadImageBtn">Upload Image</button>
<ul id="galleryAdminList"></ul>

<hr><br>

<!-- MEMBER SECTION -->
<h2>👥 ग्रामपंचायत सदस्य</h2>

<input type="text" id="memberName" placeholder="Member Name"><br><br>
<input type="text" id="memberRole" placeholder="Role"><br><br>
<input type="text" id="memberPhone" placeholder="Phone"><br><br>
<input type="number" id="memberOrder" placeholder="Display Order"><br><br>
<input type="file" id="memberPhoto" accept="image/*"><br><br>

<button id="addMemberBtn">Add Member</button>

<ul id="memberList"></ul>

<hr><br>

<h2>📋 सर्व सूचना</h2>
<ul id="adminNoticeList"></ul>

<br>
<button id="logoutBtn">Logout</button>

</section>


<script type="module">

import { auth, db, storage } from "./js/firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL,
  deleteObject
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


/* ================= AUTH ================= */

const allowedAdminEmail = "ramjansocial@gmail.com";

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  if (user.email !== allowedAdminEmail) {
    alert("Access Denied ❌");
    window.location.href = "index.html";
  }

});

document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};


/* ================= STATS ================= */

async function loadStats() {

  const notices = await getDocs(collection(db, "notices"));
  const complaints = await getDocs(collection(db, "complaints"));

  let resolved = 0;
  complaints.forEach(d => {
    if (d.data().status === "Resolved") resolved++;
  });

  document.getElementById("statsContainer").innerHTML = `
    <div>Total Notices: ${notices.size}</div>
    <div>Total Complaints: ${complaints.size}</div>
    <div>Resolved: ${resolved}</div>
  `;
}

loadStats();


/* ================= NOTICE ================= */

const noticeTitle = document.getElementById("noticeTitle");
const noticeDesc = document.getElementById("noticeDesc");
const noticeFile = document.getElementById("noticeFile");

document.getElementById("addNoticeBtn").onclick = async () => {

  if (!noticeTitle.value.trim()) {
    alert("Title required");
    return;
  }

  let fileURL = "";
  let storagePath = "";

  if (noticeFile.files[0]) {
    const file = noticeFile.files[0];
    const storageRef = ref(storage, "notices/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    fileURL = await getDownloadURL(storageRef);
    storagePath = storageRef.fullPath;
  }

  await addDoc(collection(db, "notices"), {
    title: noticeTitle.value,
    description: noticeDesc.value,
    fileUrl: fileURL,
    storagePath: storagePath,
    created: new Date()
  });

  alert("Notice Uploaded ✅");

  noticeTitle.value = "";
  noticeDesc.value = "";
  noticeFile.value = "";

  loadNotices();
  loadStats();
};

async function loadNotices() {

  const list = document.getElementById("adminNoticeList");
  list.innerHTML = "";

  const snapshot = await getDocs(collection(db, "notices"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const li = document.createElement("li");

    li.innerHTML = `
      ${data.title}
      <button>❌</button>
    `;

    li.querySelector("button").onclick = async () => {

      if (!confirm("Delete notice?")) return;

      if (data.storagePath) {
        await deleteObject(ref(storage, data.storagePath));
      }

      await deleteDoc(doc(db, "notices", docSnap.id));
      loadNotices();
      loadStats();
    };

    list.appendChild(li);
  });
}

loadNotices();


/* ================= COMPLAINTS ================= */

async function loadComplaints() {

  const container = document.getElementById("complaintList");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "complaints"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const box = document.createElement("div");
    box.innerHTML = `
      <strong>${data.trackingId}</strong> - ${data.status}<br>
      ${data.name} - ${data.phone}<br>
      ${data.message}<br>
    `;

    if (data.status !== "Resolved") {

      const btn = document.createElement("button");
      btn.innerText = "Mark Resolved";

      btn.onclick = async () => {
        await updateDoc(doc(db, "complaints", docSnap.id), {
          status: "Resolved"
        });
        loadComplaints();
        loadStats();
      };

      box.appendChild(btn);
    }

    container.appendChild(box);
  });
}

loadComplaints();


/* ================= GALLERY ================= */

document.getElementById("uploadImageBtn").onclick = async () => {

  const file = document.getElementById("imageFile").files[0];
  if (!file) return alert("Select image");

  const storageRef = ref(storage, "gallery/" + Date.now() + "_" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "gallery"), {
    imageUrl: url,
    storagePath: storageRef.fullPath,
    created: new Date()
  });

  alert("Uploaded ✅");
  loadGalleryAdmin();
};

async function loadGalleryAdmin() {

  const list = document.getElementById("galleryAdminList");
  list.innerHTML = "";

  const snapshot = await getDocs(collection(db, "gallery"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const li = document.createElement("li");

    li.innerHTML = `
      <img src="${data.imageUrl}" width="120">
      <button>❌</button>
    `;

    li.querySelector("button").onclick = async () => {

      if (!confirm("Delete image?")) return;

      await deleteObject(ref(storage, data.storagePath));
      await deleteDoc(doc(db, "gallery", docSnap.id));
      loadGalleryAdmin();
    };

    list.appendChild(li);
  });
}

loadGalleryAdmin();


/* ================= MEMBERS ================= */

document.getElementById("addMemberBtn").onclick = async () => {

  const name = document.getElementById("memberName").value;
  const role = document.getElementById("memberRole").value;
  const phone = document.getElementById("memberPhone").value;
  const order = Number(document.getElementById("memberOrder").value);
  const file = document.getElementById("memberPhoto").files[0];

  if (!name || !role) return alert("Name & Role required");

  let photoURL = "";
  let storagePath = "";

  if (file) {
    const storageRef = ref(storage, "members/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    photoURL = await getDownloadURL(storageRef);
    storagePath = storageRef.fullPath;
  }

  await addDoc(collection(db, "members"), {
    name,
    role,
    phone,
    order,
    photoUrl: photoURL,
    storagePath,
    created: new Date()
  });

  alert("Member added ✅");
  loadMembersAdmin();
};

async function loadMembersAdmin() {

  const list = document.getElementById("memberList");
  list.innerHTML = "";

  const snapshot = await getDocs(collection(db, "members"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const li = document.createElement("li");

    li.innerHTML = `
      ${data.name} - ${data.role}
      <button>❌</button>
    `;

    li.querySelector("button").onclick = async () => {

      if (!confirm("Delete member?")) return;

      if (data.storagePath) {
        await deleteObject(ref(storage, data.storagePath));
      }

      await deleteDoc(doc(db, "members", docSnap.id));
      loadMembersAdmin();
    };

    list.appendChild(li);
  });
}

loadMembersAdmin();

</script>

</body>
</html>
