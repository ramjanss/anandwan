<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section">

<h2>📊 Dashboard Overview</h2>
<div id="statsContainer" style="display:flex;gap:20px;flex-wrap:wrap;"></div>

<hr><br>

<h1>Admin Dashboard</h1>

<!-- NOTICE SECTION -->
<h2>📢 नवीन सूचना जोडा</h2>

<input type="text" id="noticeTitle" placeholder="सूचना शीर्षक" style="width:300px;padding:8px;">
<br><br>

<textarea id="noticeDesc" placeholder="सूचना तपशील" 
style="width:300px;height:80px;padding:8px;"></textarea>
<br><br>

<input type="file" id="noticeFile" accept="application/pdf">
<br><br>

<button class="btn" id="addNoticeBtn">Upload Notice</button>
<p id="noticeMsg"></p>

<hr><br>

<!-- COMPLAINT SECTION -->
<h2>📨 आलेल्या तक्रारी</h2>
<ul id="complaintList"></ul>

<hr><br>

<!-- GALLERY SECTION -->
<h2>🖼 Gallery Upload</h2>
<input type="file" id="imageFile">
<br><br>
<button class="btn" id="uploadImageBtn">Upload Image</button>
<ul id="galleryAdminList"></ul>

<hr><br>

<!-- NOTICE LIST -->
<h2>📋 सर्व सूचना</h2>
<ul id="adminNoticeList"></ul>

<br>
<button id="logoutBtn" class="btn">Logout</button>

</section>

<script type="module">

// ================= IMPORTS =================

import { auth, db, storage } from "./js/firebase.js";

import { 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { 
  ref, 
  uploadBytes, 
  getDownloadURL,
  deleteObject
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


// ================= ADMIN SECURITY =================

import { auth } from "./js/firebase.js";

import { 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const allowedAdminEmail = "ramjansocial@gmail.com";

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Restrict to only this email
  if (user.email !== allowedAdminEmail) {
    alert("Access Denied ❌ Admin only");
    signOut(auth);
    window.location.href = "index.html";
  }

});



// ================= STATS =================

const statsContainer = document.getElementById("statsContainer");

async function loadStats(){
  const noticesSnapshot = await getDocs(collection(db,"notices"));
  const complaintsSnapshot = await getDocs(collection(db,"complaints"));

  let total = 0, pending = 0, resolved = 0;

  complaintsSnapshot.forEach(docSnap=>{
    total++;
    if(docSnap.data().status==="Pending") pending++;
    if(docSnap.data().status==="Resolved") resolved++;
  });

  statsContainer.innerHTML = `
    <div class="card">Total Notices: ${noticesSnapshot.size}</div>
    <div class="card">Total Complaints: ${total}</div>
    <div class="card">Pending: ${pending}</div>
    <div class="card">Resolved: ${resolved}</div>
  `;
}

loadStats();


// ================= NOTICE SYSTEM =================

const noticeTitle = document.getElementById("noticeTitle");
const noticeDesc = document.getElementById("noticeDesc");
const noticeFile = document.getElementById("noticeFile");
const noticeMsg = document.getElementById("noticeMsg");
const adminNoticeList = document.getElementById("adminNoticeList");
const addNoticeBtn = document.getElementById("addNoticeBtn");

addNoticeBtn.onclick = async () => {

  if(noticeTitle.value.trim()===""){
    alert("Title required");
    return;
  }

  addNoticeBtn.innerText="Uploading...";
  addNoticeBtn.disabled=true;

  try{

    let fileURL="";
    let storagePath="";

    if(noticeFile.files[0]){
      const file=noticeFile.files[0];
      const storageRef=ref(storage,"notices/"+Date.now()+"_"+file.name);
      await uploadBytes(storageRef,file);
      fileURL=await getDownloadURL(storageRef);
      storagePath=storageRef.fullPath;
    }

    await addDoc(collection(db,"notices"),{
      title:noticeTitle.value,
      description:noticeDesc.value,
      fileUrl:fileURL,
      storagePath:storagePath,
      created:new Date()
    });

    noticeMsg.innerHTML="Notice uploaded successfully ✅";

    noticeTitle.value="";
    noticeDesc.value="";
    noticeFile.value="";

    loadNotices();
    loadStats();

  }catch(error){
    console.error(error);
    noticeMsg.innerHTML="Upload failed ❌";
  }

  addNoticeBtn.innerText="Upload Notice";
  addNoticeBtn.disabled=false;
};

async function loadNotices(){
  adminNoticeList.innerHTML="";
  const snapshot=await getDocs(collection(db,"notices"));

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();

    const li=document.createElement("li");
    li.innerHTML=`
      <strong>${data.title}</strong>
      <button onclick="deleteNotice('${docSnap.id}','${data.storagePath||""}')">❌</button>
    `;
    adminNoticeList.appendChild(li);
  });
}

window.deleteNotice=async(id,storagePath)=>{
  if(!confirm("Delete this notice?")) return;

  try{
    if(storagePath){
      const fileRef=ref(storage,storagePath);
      await deleteObject(fileRef);
    }
    await deleteDoc(doc(db,"notices",id));
    loadNotices();
    loadStats();
  }catch(error){
    console.error(error);
    alert("Delete failed ❌");
  }
};

loadNotices();


// ================= COMPLAINT SYSTEM =================

async function loadComplaints(){
  complaintList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "complaints"));

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const createdDate = data.createdAt?.toDate();
    const formattedDate = createdDate
      ? createdDate.toLocaleString()
      : "N/A";

    const wrapper = document.createElement("div");
    wrapper.style.background = "#f9fafc";
    wrapper.style.padding = "15px";
    wrapper.style.borderRadius = "12px";
    wrapper.style.marginBottom = "15px";

    wrapper.innerHTML = `
      <strong>Tracking ID:</strong> ${data.trackingId || "Old Complaint"} <br>
      <strong>Name:</strong> ${data.name} <br>
      <strong>Phone:</strong> ${data.phone} <br>
      <strong>Message:</strong> ${data.message} <br>
      <strong>Date:</strong> ${formattedDate} <br>
      <strong>Status:</strong> ${data.status} <br><br>
    `;

    // Create button dynamically (NO inline onclick)
    if(data.status !== "Resolved"){

      const btn = document.createElement("button");
      btn.innerText = "Mark Resolved";
      btn.style.padding = "6px 12px";
      btn.style.cursor = "pointer";

      btn.addEventListener("click", async () => {

        try{
          await updateDoc(doc(db, "complaints", docSnap.id), {
            status: "Resolved"
          });

          loadComplaints();
          if(typeof loadStats === "function"){
            loadStats();
          }

        }catch(error){
          console.error("Resolve error:", error);
        }

      });

      wrapper.appendChild(btn);
    }

    complaintList.appendChild(wrapper);

  });
}

loadComplaints();

// ================= GALLERY SYSTEM =================

const uploadBtn = document.getElementById("uploadImageBtn");
const imageFile = document.getElementById("imageFile");
const galleryAdminList = document.getElementById("galleryAdminList");

uploadBtn.onclick = async () => {

  const file = imageFile.files[0];

  if(!file){
    alert("Please select an image first.");
    return;
  }

  uploadBtn.innerText = "Uploading...";
  uploadBtn.disabled = true;

  try {

    const storageRef = ref(storage, "gallery/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    const downloadURL = await getDownloadURL(storageRef);

    await addDoc(collection(db,"gallery"),{
      imageUrl: downloadURL,
      storagePath: storageRef.fullPath,
      created: new Date()
    });

    alert("Image uploaded successfully ✅");

    imageFile.value = "";
    loadGalleryAdmin();

  } catch(error){
    console.error("Upload error:", error);
    alert("Upload failed ❌");
  }

  uploadBtn.innerText = "Upload Image";
  uploadBtn.disabled = false;
};

async function loadGalleryAdmin(){
  galleryAdminList.innerHTML = "";
  const snapshot = await getDocs(collection(db,"gallery"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const li = document.createElement("li");

    li.innerHTML = `
      <img src="${data.imageUrl}" width="150" style="border-radius:10px;">
      <br>
      <button onclick="deleteGallery('${docSnap.id}','${data.storagePath||""}')">❌ Delete</button>
      <hr>
    `;

    galleryAdminList.appendChild(li);
  });
}

window.deleteGallery = async (docId, storagePath) => {

  if(!confirm("Delete this image?")) return;

  try{
    if(storagePath){
      const fileRef = ref(storage, storagePath);
      await deleteObject(fileRef);
    }

    await deleteDoc(doc(db,"gallery",docId));
    loadGalleryAdmin();

  }catch(error){
    console.error(error);
    alert("Delete failed ❌");
  }
};

loadGalleryAdmin();

</script>

</body>
</html>
