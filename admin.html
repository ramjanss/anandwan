<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section">

<h1>Admin Dashboard</h1>

<h2>📢 नवीन सूचना जोडा</h2>

<input type="text" id="noticeTitle" placeholder="सूचना शीर्षक" style="width:300px;padding:8px;">
<br><br>
<button class="btn" id="addNoticeBtn">Add Notice</button>

<hr><br>

<h2>📋 सर्व सूचना</h2>
<ul id="adminNoticeList"></ul>

<br>
<button id="logoutBtn" class="btn">Logout</button>

</section>

<script type="module">

import { auth } from "./js/firebase.js";
import { db } from "./js/firebase.js";

import { 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔐 Protect Page
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// 🔓 Logout
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "login.html";
};


// 📢 Add Notice
const noticeTitle = document.getElementById("noticeTitle");
const addNoticeBtn = document.getElementById("addNoticeBtn");
const adminNoticeList = document.getElementById("adminNoticeList");

addNoticeBtn.onclick = async () => {

  if(noticeTitle.value.trim() === "") return;

  await addDoc(collection(db, "notices"), {
    title: noticeTitle.value,
    created: new Date()
  });

  noticeTitle.value = "";
  loadNotices();
};


// 📋 Load Notices
async function loadNotices(){
  adminNoticeList.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "notices"));

  querySnapshot.forEach((docSnap) => {

    const li = document.createElement("li");

    li.innerHTML = `
      ${docSnap.data().title}
      <button onclick="deleteNotice('${docSnap.id}')">❌</button>
    `;

    adminNoticeList.appendChild(li);
  });
}


// ❌ Delete Notice
window.deleteNotice = async (id) => {
  await deleteDoc(doc(db, "notices", id));
  loadNotices();
};

loadNotices();

</script>

</body>
</html>
