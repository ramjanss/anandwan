<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Complaints</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-members.html">Members</a>
    <a href="admin-notices.html">Notices</a>
    <a href="admin-gallery.html">Gallery</a>
    <a href="admin-complaints.html" class="active">Complaints</a>
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">

    <h1>📨 Manage Complaints</h1>

    <div style="margin-bottom:20px; display:flex; gap:15px; flex-wrap:wrap; align-items:center;">
      <input type="text" id="searchInput"
        placeholder="Search by Tracking ID or Name"
        style="padding:8px 12px; border-radius:6px; border:1px solid #ccc; width:250px;">

      <button onclick="filterComplaints('all')" class="filter-btn">All</button>
      <button onclick="filterComplaints('Pending')" class="filter-btn">Pending</button>
      <button onclick="filterComplaints('Resolved')" class="filter-btn">Resolved</button>
      <button onclick="filterComplaints('Replied')" class="filter-btn">Replied</button>
    </div>

    <div id="complaintsContainer"></div>

  </main>
</div>

<!-- MODAL -->
<div id="complaintModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import {
  collection,
  getDocs,
  updateDoc,
  doc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container = document.getElementById("complaintsContainer");
const modal = document.getElementById("complaintModal");
const modalBody = document.getElementById("modalBody");

let allComplaints = [];
let currentFilter = "all";

/* LOAD */
async function loadComplaints(){
  container.innerHTML = "Loading...";

  const q = query(collection(db,"complaints"), orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  allComplaints = [];
  snapshot.forEach(docSnap=>{
    allComplaints.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderComplaints("all");
}

/* FILTER */
window.filterComplaints = function(status){
  renderComplaints(status);
};

/* RENDER */
function renderComplaints(filter){

  currentFilter = filter;
  container.innerHTML = "";

  const searchValue = document.getElementById("searchInput").value.toLowerCase();

  let filtered = filter === "all"
    ? allComplaints
    : allComplaints.filter(c => c.status === filter);

  if(searchValue){
    filtered = filtered.filter(c =>
      (c.trackingId && c.trackingId.toLowerCase().includes(searchValue)) ||
      (c.name && c.name.toLowerCase().includes(searchValue))
    );
  }

  if(filtered.length === 0){
    container.innerHTML = "<p>No complaints found.</p>";
    return;
  }

  filtered.forEach(c=>{
    const card = document.createElement("div");
    card.className = "complaint-card";

    card.innerHTML = `
      <strong>${c.trackingId}</strong> - ${c.name}
      <span class="status-badge ${c.status}">
        ${c.status}
      </span>
    `;

    card.onclick = () => openModal(c);
    container.appendChild(card);
  });
}

/* MODAL */
window.openModal = function(c){

  const createdDate = c.createdAt?.toDate();
  const formattedDate = createdDate
    ? createdDate.toLocaleString()
    : "N/A";

  modalBody.innerHTML = `
    <h2>Complaint Details</h2>
    <p><strong>Tracking ID:</strong> ${c.trackingId}</p>
    <p><strong>Name:</strong> ${c.name}</p>
    <p><strong>Phone:</strong> ${c.phone}</p>
    <p><strong>Date:</strong> ${formattedDate}</p>
    <p><strong>Status:</strong> ${c.status}</p>
    <hr>
    <p><strong>Message:</strong></p>
    <div class="message-box">${c.message}</div>
    <hr>
  `;

  // SHOW EXISTING REPLY
  if(c.reply){
    modalBody.innerHTML += `
      <p><strong>Admin Reply:</strong></p>
      <div class="reply-box">${c.reply}</div>
      <br>
    `;
  }

  // ADD REPLY OPTION
  if(c.status !== "Resolved"){
    const textarea = document.createElement("textarea");
    textarea.placeholder = "Write reply to citizen...";
    textarea.style.width = "100%";
    textarea.style.height = "80px";
    textarea.style.marginTop = "10px";

    const btn = document.createElement("button");
    btn.innerText = "Send Reply";
    btn.className = "resolve-btn";

    btn.onclick = async () => {

      if(textarea.value.trim() === ""){
        alert("Reply cannot be empty");
        return;
      }

      await updateDoc(doc(db,"complaints",c.id),{
        reply: textarea.value,
        status: "Replied",
        replyDate: new Date()
      });

      closeModal();
      loadComplaints();
    };

    modalBody.appendChild(textarea);
    modalBody.appendChild(btn);
  }

  modal.style.display = "flex";
};

window.closeModal = function(){
  modal.style.display = "none";
};

/* SEARCH */
document.getElementById("searchInput")
  .addEventListener("input", () => {
    renderComplaints(currentFilter);
});

loadComplaints();

</script>

<style>

.complaint-card{
  background:#fff;
  padding:15px 20px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}
.complaint-card:hover{
  transform:translateY(-3px);
}

.status-badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}
.status-badge.Pending{ background:#f59e0b; }
.status-badge.Resolved{ background:#16a34a; }
.status-badge.Replied{ background:#2563eb; }

.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:30px;
  border-radius:15px;
  width:500px;
  max-width:90%;
  position:relative;
}
.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
}
.message-box, .reply-box{
  background:#f3f4f6;
  padding:10px;
  border-radius:8px;
}
.resolve-btn{
  background:#1e3a8a;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}
.filter-btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}
.filter-btn:hover{ opacity:0.8; }

</style>

</body>
</html>
