<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Complaints</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-members.html">Members</a>
    <a href="admin-notices.html">Notices</a>
    <a href="admin-gallery.html">Gallery</a>
    <a href="admin-complaints.html" class="active">Complaints</a>
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">

    <h1>📨 Manage Complaints</h1>

    <div style="margin-bottom:20px; display:flex; gap:15px; flex-wrap:wrap; align-items:center;">

      <input 
        type="text" 
        id="searchInput"
        placeholder="Search by Tracking ID or Name"
        style="padding:8px 12px; border-radius:6px; border:1px solid #ccc; width:250px;"
      >

      <button onclick="filterComplaints('all')" class="filter-btn">All</button>
      <button onclick="filterComplaints('Pending')" class="filter-btn">Pending</button>
      <button onclick="filterComplaints('Resolved')" class="filter-btn">Resolved</button>

    </div>

    <div id="complaintsContainer"></div>

  </main>

</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, getDocs, updateDoc, doc, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container = document.getElementById("complaintsContainer");

let allComplaints = [];
let currentFilter = "all";
let currentPage = 1;
const itemsPerPage = 5;


/* ================= LOAD ================= */

async function loadComplaints(){

  container.innerHTML = "Loading...";

  const q = query(collection(db,"complaints"), orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  allComplaints = [];

  snapshot.forEach(docSnap=>{
    allComplaints.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  currentPage = 1;
  renderComplaints("all");
}


/* ================= FILTER ================= */

window.filterComplaints = function(status){
  currentPage = 1;
  renderComplaints(status);
};


/* ================= RENDER ================= */

function renderComplaints(filter){

  currentFilter = filter;
  container.innerHTML = "";

  const searchValue = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  let filtered = filter === "all"
    ? allComplaints
    : allComplaints.filter(c => c.status === filter);

  if(searchValue){
    filtered = filtered.filter(c =>
      (c.trackingId && c.trackingId.toLowerCase().includes(searchValue)) ||
      (c.name && c.name.toLowerCase().includes(searchValue))
    );
  }

  const totalPages = Math.ceil(filtered.length / itemsPerPage) || 1;

  if(currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginatedData = filtered.slice(start, end);

  if(paginatedData.length === 0){
    container.innerHTML = "<p>No complaints found.</p>";
    return;
  }

  paginatedData.forEach(c=>{

    const createdDate = c.createdAt?.toDate();
    const formattedDate = createdDate
      ? createdDate.toLocaleString()
      : "N/A";

    const statusColor = c.status === "Resolved" ? "#16a34a" : "#f59e0b";

    const card = document.createElement("div");
    card.style.background = "#fff";
    card.style.padding = "20px";
    card.style.borderRadius = "12px";
    card.style.marginBottom = "20px";
    card.style.boxShadow = "0 10px 25px rgba(0,0,0,0.08)";

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>Tracking ID: ${c.trackingId || "N/A"}</strong>
        <span style="
          padding:6px 12px;
          border-radius:20px;
          font-size:12px;
          background:${statusColor};
          color:white;
        ">
          ${c.status}
        </span>
      </div>

      <hr style="margin:12px 0;">

      <strong>Name:</strong> ${c.name} <br>
      <strong>Phone:</strong> ${c.phone} <br>
      <strong>Date:</strong> ${formattedDate} <br><br>

      <strong>Message:</strong>
      <div style="
        background:#f3f4f6;
        padding:10px;
        border-radius:8px;
        margin-top:5px;
      ">
        ${c.message}
      </div>
      <br>
    `;

    if(c.status !== "Resolved"){
      const btn = document.createElement("button");
      btn.innerText = "Mark Resolved";
      btn.className = "resolve-btn";

      btn.onclick = async () => {
        await updateDoc(doc(db,"complaints",c.id),{
          status:"Resolved"
        });
        loadComplaints();
      };

      card.appendChild(btn);
    }

    container.appendChild(card);
  });

  renderPagination(totalPages);
}


/* ================= PAGINATION ================= */

function renderPagination(totalPages){

  const existing = document.getElementById("pagination");
  if(existing) existing.remove();

  if(totalPages <= 1) return;

  const pagination = document.createElement("div");
  pagination.id = "pagination";
  pagination.style.marginTop = "25px";
  pagination.style.display = "flex";
  pagination.style.gap = "8px";
  pagination.style.flexWrap = "wrap";
  pagination.style.alignItems = "center";

  // Previous
  const prevBtn = document.createElement("button");
  prevBtn.innerText = "Prev";
  prevBtn.disabled = currentPage === 1;
  prevBtn.className = "page-btn";
  prevBtn.onclick = () => {
    currentPage--;
    renderComplaints(currentFilter);
  };
  pagination.appendChild(prevBtn);

  // Page numbers
  for(let i = 1; i <= totalPages; i++){

    const pageBtn = document.createElement("button");
    pageBtn.innerText = i;
    pageBtn.className = "page-btn";

    if(i === currentPage){
      pageBtn.style.background = "#16a34a";
    }

    pageBtn.onclick = () => {
      currentPage = i;
      renderComplaints(currentFilter);
    };

    pagination.appendChild(pageBtn);
  }

  // Next
  const nextBtn = document.createElement("button");
  nextBtn.innerText = "Next";
  nextBtn.disabled = currentPage === totalPages;
  nextBtn.className = "page-btn";
  nextBtn.onclick = () => {
    currentPage++;
    renderComplaints(currentFilter);
  };

  pagination.appendChild(nextBtn);

  container.appendChild(pagination);
}


/* ================= SEARCH ================= */

document.getElementById("searchInput")
  .addEventListener("input", () => {
    currentPage = 1;
    renderComplaints(currentFilter);
});


/* ================= INIT ================= */

loadComplaints();

</script>

<style>

.filter-btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}

.filter-btn:hover{
  opacity:0.8;
}

.page-btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}

.page-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.resolve-btn{
  background:#1e3a8a;
  color:white;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.resolve-btn:hover{
  opacity:0.9;
}

</style>

</body>
</html>
