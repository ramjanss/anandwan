<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Complaints</title>
<link rel="stylesheet" href="admin.css">

<style>
.filter-btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}
.filter-btn:hover{
  opacity:0.8;
}
.export-btn{
  background:#16a34a;
}
</style>

</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="admin-members.html">Members</a>
    <a href="admin-notices.html">Notices</a>
    <a href="admin-gallery.html">Gallery</a>
    <a href="admin-complaints.html" class="active">Complaints</a>
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">

    <h1>📨 Manage Complaints</h1>

    <div style="margin-bottom:20px; display:flex; gap:15px; flex-wrap:wrap; align-items:center;">

      <input 
        type="text" 
        id="searchInput"
        placeholder="Search by Tracking ID or Name"
        style="padding:8px 12px; border-radius:6px; border:1px solid #ccc; width:250px;"
      >

      <button onclick="filterComplaints('all')" class="filter-btn">All</button>
      <button onclick="filterComplaints('Pending')" class="filter-btn">Pending</button>
      <button onclick="filterComplaints('Resolved')" class="filter-btn">Resolved</button>

      <button id="exportBtn" class="filter-btn export-btn">
        Export to Excel
      </button>

    </div>

    <div id="complaintsContainer"></div>

  </main>

</div>

<!-- Excel Library -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, getDocs, updateDoc, doc, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container = document.getElementById("complaintsContainer");

let allComplaints = [];
let currentFilter = "all";

/* ================= LOAD ================= */

async function loadComplaints(){

  container.innerHTML = "Loading...";

  const q = query(collection(db,"complaints"), orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  allComplaints = [];

  snapshot.forEach(docSnap=>{
    allComplaints.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderComplaints("all");
}

/* ================= FILTER ================= */

window.filterComplaints = function(status){
  renderComplaints(status);
};

/* ================= RENDER ================= */

function renderComplaints(filter){

  currentFilter = filter;
  container.innerHTML = "";

  const searchValue = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  let filtered = filter === "all"
    ? allComplaints
    : allComplaints.filter(c => c.status === filter);

  if(searchValue){
    filtered = filtered.filter(c =>
      (c.trackingId && c.trackingId.toLowerCase().includes(searchValue)) ||
      (c.name && c.name.toLowerCase().includes(searchValue))
    );
  }

  if(filtered.length === 0){
    container.innerHTML = "<p>No complaints found.</p>";
    return;
  }

  filtered.forEach(c=>{

    const createdDate = c.createdAt?.toDate();
    const formattedDate = createdDate
      ? createdDate.toLocaleString()
      : "N/A";

    const statusColor = c.status === "Resolved" ? "#16a34a" : "#f59e0b";

    const card = document.createElement("div");
    card.style.background = "#fff";
    card.style.padding = "20px";
    card.style.borderRadius = "12px";
    card.style.marginBottom = "20px";
    card.style.boxShadow = "0 10px 25px rgba(0,0,0,0.08)";

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>Tracking ID: ${c.trackingId || "N/A"}</strong>
        <span style="
          padding:6px 12px;
          border-radius:20px;
          font-size:12px;
          background:${statusColor};
          color:white;
        ">
          ${c.status}
        </span>
      </div>

      <hr style="margin:12px 0;">

      <strong>Name:</strong> ${c.name} <br>
      <strong>Phone:</strong> ${c.phone} <br>
      <strong>Date:</strong> ${formattedDate} <br><br>

      <strong>Message:</strong>
      <div style="
        background:#f3f4f6;
        padding:10px;
        border-radius:8px;
        margin-top:5px;
      ">
        ${c.message}
      </div>
      <br>
    `;

    if(c.status !== "Resolved"){
      const btn = document.createElement("button");
      btn.innerText = "Mark Resolved";
      btn.style.background = "#1e3a8a";
      btn.style.color = "white";
      btn.style.padding = "8px 14px";
      btn.style.border = "none";
      btn.style.borderRadius = "6px";
      btn.style.cursor = "pointer";

      btn.onclick = async () => {
        await updateDoc(doc(db,"complaints",c.id),{
          status:"Resolved"
        });
        loadComplaints();
      };

      card.appendChild(btn);
    }

    container.appendChild(card);
  });
}

/* ================= SEARCH ================= */

document.getElementById("searchInput")
  .addEventListener("input", () => {
    renderComplaints(currentFilter);
});

/* ================= EXPORT ================= */

document.getElementById("exportBtn")
  .addEventListener("click", () => {

    let filtered = currentFilter === "all"
      ? allComplaints
      : allComplaints.filter(c => c.status === currentFilter);

    const data = filtered.map(c => ({
      "Tracking ID": c.trackingId || "",
      "Name": c.name || "",
      "Phone": c.phone || "",
      "Status": c.status || "",
      "Date": c.createdAt?.toDate().toLocaleString() || ""
    }));

    const worksheet = XLSX.utils.json_to_sheet(data);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Complaints");

    XLSX.writeFile(workbook, "Complaints.xlsx");
});

/* ================= INIT ================= */

loadComplaints();

</script>

</body>
</html>
