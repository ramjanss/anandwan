<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तक्रार स्थिती तपासा</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section">

<h1>तक्रार स्थिती तपासा</h1>

<input type="text" id="trackId" placeholder="Tracking ID" style="width:300px;padding:8px;">
<br><br>

<button class="btn" id="trackBtn">Check Status</button>

<p id="result"></p>

</section>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, getDocs, query, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.getElementById("trackBtn").onclick = async () => {

  const trackId = document.getElementById("trackId").value;
  const result = document.getElementById("result");

  const q = query(
    collection(db, "complaints"),
    where("trackingId", "==", trackId)
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    result.innerText = "तक्रार सापडली नाही.";
    return;
  }

  snapshot.forEach(doc => {
    const data = doc.data();
    result.innerHTML = `
      <strong>Status:</strong> ${data.status}<br>
      <strong>Message:</strong> ${data.message}
    `;
  });
};

</script>

</body>
</html>
