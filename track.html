<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Complaint</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="section" style="max-width:600px;margin:auto;">

  <h1>🔍 Track Your Complaint</h1>

  <input 
    type="text" 
    id="trackingInput" 
    placeholder="Enter Tracking ID"
    style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;margin-top:20px;"
  >

  <button 
    id="trackBtn"
    style="margin-top:15px;padding:10px 20px;border:none;background:#1e3a8a;color:white;border-radius:6px;cursor:pointer;"
  >
    Track
  </button>

  <div id="resultBox" style="margin-top:30px;"></div>

</section>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, getDocs, query, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const trackBtn = document.getElementById("trackBtn");
const resultBox = document.getElementById("resultBox");

trackBtn.onclick = async () => {

  const trackingId = document
    .getElementById("trackingInput")
    .value
    .trim();

  if(!trackingId){
    alert("Please enter Tracking ID");
    return;
  }

  resultBox.innerHTML = "Checking...";

  const q = query(
    collection(db,"complaints"),
    where("trackingId","==",trackingId)
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    resultBox.innerHTML = `
      <div style="
        background:#fee2e2;
        padding:20px;
        border-radius:10px;
        color:#991b1b;
      ">
        ❌ Complaint not found.
      </div>
    `;
    return;
  }

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    const createdDate = data.createdAt?.toDate();
    const formattedDate = createdDate
      ? createdDate.toLocaleString()
      : "N/A";

    const replyDate = data.replyDate?.toDate();
    const formattedReplyDate = replyDate
      ? replyDate.toLocaleString()
      : "";

    let statusColor = "#f59e0b";
    if(data.status === "Replied") statusColor = "#2563eb";
    if(data.status === "Resolved") statusColor = "#16a34a";

    resultBox.innerHTML = `
      <div style="
        background:#fff;
        padding:25px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
      ">

        <div style="display:flex;justify-content:space-between;">
          <strong>Tracking ID: ${data.trackingId}</strong>
          <span style="
            background:${statusColor};
            color:white;
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
          ">
            ${data.status}
          </span>
        </div>

        <hr style="margin:15px 0;">

        <p><strong>Name:</strong> ${data.name}</p>
        <p><strong>Phone:</strong> ${data.phone}</p>
        <p><strong>Date Submitted:</strong> ${formattedDate}</p>

        <hr style="margin:15px 0;">

        <p><strong>Your Complaint:</strong></p>
        <div style="
          background:#f3f4f6;
          padding:10px;
          border-radius:8px;
        ">
          ${data.message}
        </div>

        ${data.reply ? `
          <hr style="margin:15px 0;">

          <p><strong>Admin Reply:</strong></p>
          <div style="
            background:#ecfdf5;
            padding:10px;
            border-radius:8px;
            border-left:4px solid #16a34a;
          ">
            ${data.reply}
          </div>

          <p style="font-size:12px;color:#555;margin-top:5px;">
            Replied on: ${formattedReplyDate}
          </p>
        ` : ""}

      </div>
    `;
  });
};

</script>

</body>
</html>
