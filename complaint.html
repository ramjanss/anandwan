<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तक्रार नोंदवा</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins','Noto Sans Devanagari',sans-serif;
  background:#f4f6fb;
}

.section{
  max-width:600px;
  margin:80px auto;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin-bottom:30px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#0048ff;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0036c7;
}

.success-box{
  background:#e6f7ee;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  display:none;
}

.success-box strong{
  color:#0a7c42;
}

.home-link{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="section">

<h1>📨 तक्रार नोंदवा</h1>

<input type="text" id="name" placeholder="आपले नाव" required>
<input type="text" id="phone" placeholder="मोबाईल नंबर" required>
<textarea id="message" placeholder="आपली तक्रार लिहा" rows="4" required></textarea>

<button id="submitBtn">Submit Complaint</button>

<div class="success-box" id="successBox">
  ✅ तक्रार यशस्वीरित्या नोंदवली गेली! <br><br>
  तुमचा Tracking ID: <strong id="trackingIdText"></strong>
</div>

<div class="home-link">
  <a href="index.html">← Home</a>
</div>

</div>


<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const submitBtn = document.getElementById("submitBtn");

submitBtn.onclick = async () => {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const message = document.getElementById("message").value.trim();

  if(name === "" || phone === "" || message === ""){
    alert("Please fill all fields");
    return;
  }

  submitBtn.innerText = "Submitting...";
  submitBtn.disabled = true;

  try{

    const trackingId = "GP" + Date.now();

    await addDoc(collection(db, "complaints"), {
      name: name,
      phone: phone,
      message: message,
      status: "Pending",
      trackingId: trackingId,
      createdAt: new Date()
    });

    document.getElementById("trackingIdText").innerText = trackingId;
    document.getElementById("successBox").style.display = "block";

    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("message").value = "";

  }catch(error){
    console.error(error);
    alert("Something went wrong ❌");
  }

  submitBtn.innerText = "Submit Complaint";
  submitBtn.disabled = false;
};

</script>

</body>
</html>
