<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Complaint | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f2f6f;
  --light:#f8fafc;
}

body{
  margin:0;
  font-family:'Noto Sans',sans-serif;
  background:#f3f6fb;
}

/* Header */
.page-header{
  background:var(--primary);
  color:white;
  padding:40px 20px;
  text-align:center;
}

.page-header h1{
  margin:0;
  font-family:'Noto Serif',serif;
}

/* Form Section */
.section{
  max-width:700px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.section h2{
  margin-top:0;
  color:var(--primary);
}

.form-group{
  margin-bottom:18px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-family:'Noto Sans',sans-serif;
}

textarea{
  resize:none;
  min-height:100px;
}

button{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.success-box{
  margin-top:20px;
  padding:15px;
  background:#e0f2fe;
  border-left:5px solid #0284c7;
  border-radius:8px;
}

footer{
  text-align:center;
  padding:30px;
  background:#0f2f6f;
  color:white;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="page-header">
  <h1>Register Public Complaint</h1>
</div>

<div class="section">

  <h2>Complaint Form</h2>

  <div class="form-group">
    <input type="text" id="name" placeholder="Full Name">
  </div>

  <div class="form-group">
    <input type="text" id="mobile" placeholder="Mobile Number">
  </div>

  <div class="form-group">
    <select id="category">
      <option value="">Select Category</option>
      <option>Water Supply</option>
      <option>Road</option>
      <option>Electricity</option>
      <option>Sanitation</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-group">
    <textarea id="description" placeholder="Describe your complaint"></textarea>
  </div>

  <button onclick="submitComplaint()">Submit Complaint</button>

  <div id="successMessage"></div>

</div>

<footer>
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.submitComplaint = async function(){

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("mobile").value.trim();
  const message = document.getElementById("description").value.trim();

  if(!name || !phone || !message){
    alert("All fields are required.");
    return;
  }

  const trackingId = "GP" + Date.now();

  try{

    await addDoc(collection(db,"complaints"),{
      trackingId,
      name,
      phone,
      message,
      status:"Pending",
      created:new Date()
    });

    document.getElementById("successMessage").innerHTML = `
      <div class="success-box">
        Complaint Registered Successfully.<br>
        <strong>Your Tracking ID: ${trackingId}</strong>
      </div>
    `;

  }catch(error){
    alert("Failed to submit complaint.");
    console.error(error);
  }
};

document.getElementById("year").textContent =
  new Date().getFullYear();

</script>

</body>
</html>
