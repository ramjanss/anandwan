<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notices | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --light:#f8fafc;
  --text:#1f2937;
}
body{margin:0;font-family:'Noto Sans',sans-serif;color:var(--text);}

.page-title{
  background:var(--light);
  padding:50px 20px;
  text-align:center;
}
.page-title h1{
  font-family:'Noto Serif',serif;
  font-size:32px;
  color:var(--primary);
  margin:0;
}

.section{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.notice-card{
  background:#fff;
  border:1px solid #e5e7eb;
  padding:18px;
  margin-bottom:20px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.notice-title{
  font-weight:600;
}

.notice-date{
  font-size:13px;
  color:#666;
}

.notice-link{
  background:var(--primary);
  color:white;
  padding:6px 14px;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
}
</style>
</head>
<body>

<div class="page-title">
<h1>Public Notices</h1>
</div>

<section class="section">
<div id="noticeContainer"></div>
</section>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadNotices(){
const container=document.getElementById("noticeContainer");
container.innerHTML="";

const snap=await getDocs(
query(collection(db,"notices"),orderBy("createdAt","desc"))
);

snap.forEach(doc=>{
const d=doc.data();
const date=d.createdAt?.toDate().toLocaleDateString('en-IN');

container.innerHTML+=`
<div class="notice-card">
<div>
<div class="notice-title">${d.title}</div>
<div class="notice-date">${date||""}</div>
</div>
${d.fileUrl?`<a href="${d.fileUrl}" target="_blank" class="notice-link">Download</a>`:""}
</div>
`;
});
}
loadNotices();
</script>

</body>
</html>
