<script type="module">

import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* ================= HERO AUTO SLIDE ================= */

const hero = document.getElementById("hero");
const images = [
  "assets/slide1.jpg",
  "assets/slide2.jpg",
  "assets/slide3.jpg"
];

let index = 0;

function changeBackground(){
  hero.style.backgroundImage = `url('${images[index]}')`;
  index = (index + 1) % images.length;
}

changeBackground();
setInterval(changeBackground,5000);


/* ================= DASHBOARD ================= */

async function loadDashboard(){

  const complaintSnap = await getDocs(collection(db,"complaints"));
  const noticeSnap = await getDocs(collection(db,"notices"));

  let total = complaintSnap.size;
  let resolved = 0;

  complaintSnap.forEach(d=>{
    if(d.data().status === "Resolved") resolved++;
  });

  document.getElementById("totalComplaints").textContent = total;
  document.getElementById("resolvedComplaints").textContent = resolved;
  document.getElementById("pendingComplaints").textContent = total - resolved;
  document.getElementById("totalNotices").textContent = noticeSnap.size;
}

loadDashboard();


/* ================= LEADERSHIP ================= */

async function loadLeadership(){

  const snap = await getDocs(collection(db,"members"));

  const leaderContainer = document.getElementById("leaderContainer");
  const bodyContainer = document.getElementById("bodyContainer");
  const employeeContainer = document.getElementById("employeeContainer");

  leaderContainer.innerHTML = "";
  bodyContainer.innerHTML = "";
  employeeContainer.innerHTML = "";

  snap.forEach(doc=>{
    const data = doc.data();

    const card = `
      <div class="leader-card">
        <img src="${data.photoUrl}" alt="${data.name}">
        <h4>${data.name}</h4>
        <p>${data.role}</p>
        <small>${data.phone || ""}</small>
      </div>
    `;

    if(data.type === "leader"){
      leaderContainer.innerHTML += card;
    }
    else if(data.type === "body"){
      bodyContainer.innerHTML += card;
    }
    else if(data.type === "employee"){
      employeeContainer.innerHTML += card;
    }
  });
}

loadLeadership();


/* ================= EVENTS ================= */

async function loadEvents(){

  const container = document.getElementById("eventsContainer");

  if(!container) return;

  container.innerHTML = "Loading events...";

  try {

    const q = query(
      collection(db,"events"),
      orderBy("eventDate","desc")
    );

    const snapshot = await getDocs(q);

    container.innerHTML = "";

    if(snapshot.empty){
      container.innerHTML = "<p>No events available.</p>";
      return;
    }

    snapshot.forEach(doc=>{
      const data = doc.data();

      const eventDate = data.eventDate?.toDate();
      const formattedDate = eventDate
        ? eventDate.toLocaleDateString()
        : "";

      container.innerHTML += `
        <div class="event-card">
          <img src="${data.imageUrl || ''}" alt="${data.title}">
          <div class="event-content">
            <h4>${data.title}</h4>
            <div class="event-date">${formattedDate}</div>
            <p>${data.description || ''}</p>
          </div>
        </div>
      `;
    });

  } catch(error){
    console.error("Homepage Event Error:", error);
    container.innerHTML = "<p>Failed to load events.</p>";
  }
}

loadEvents();


/* ================= GALLERY ================= */

async function loadGallery(){

  const snap = await getDocs(collection(db,"gallery"));
  const container = document.getElementById("galleryContainer");

  container.innerHTML = "";

  snap.forEach(doc=>{
    const data = doc.data();
    container.innerHTML += `<img src="${data.imageUrl}">`;
  });
}

loadGallery();

</script>
