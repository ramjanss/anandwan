<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ग्रामपंचायत वंधली</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins','Noto Sans Devanagari',sans-serif;
  background:#f4f6fb;
  color:#222;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0048ff,#00c6ff);
  color:white;
  padding:100px 20px;
  text-align:center;
}

.hero h1{
  font-size:42px;
  margin:0;
}

.hero p{
  margin:15px 0 30px;
  opacity:0.9;
}

.btn{
  padding:12px 26px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  margin:5px;
  display:inline-block;
  transition:0.3s;
}

.btn-primary{
  background:white;
  color:#0048ff;
}

.btn-primary:hover{
  background:#e6edff;
}

.btn-outline{
  border:2px solid white;
  color:white;
}

.section{
  padding:70px 20px;
  max-width:1100px;
  margin:auto;
}

/* STATS */
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-card{
  flex:1;
  min-width:220px;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  text-align:center;
}

.stat-card h2{
  font-size:34px;
  margin:0;
  color:#0048ff;
}

/* DARK SECTION */
.dark-section{
  background:#111827;
  color:white;
}

.notice-card{
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.new-badge{
  background:#ff3b3b;
  color:white;
  font-size:12px;
  padding:3px 8px;
  border-radius:12px;
  margin-left:10px;
}

/* GALLERY */
.gallery{
  display:flex;
  gap:15px;
  overflow:hidden;
  position:relative;
}

.gallery-track{
  display:flex;
  gap:15px;
  animation:scroll 20s linear infinite;
}

.gallery img{
  width:260px;
  height:170px;
  object-fit:cover;
  border-radius:15px;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

footer{
  background:#000;
  color:#aaa;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ग्रामपंचायत वंधली</h1>
  <p>Smart • Transparent • Digital Governance</p>

  <a href="complaint.html" class="btn btn-primary">तक्रार नोंदवा</a>
  <a href="track.html" class="btn btn-outline">तक्रार ट्रॅक करा</a>
</section>

<!-- STATS -->
<section class="section">
  <h2>📊 Live Transparency</h2>
  <div class="stats">
    <div class="stat-card">
      <h2 id="noticeCount">0</h2>
      <p>Notices</p>
    </div>
    <div class="stat-card">
      <h2 id="complaintCount">0</h2>
      <p>Total Complaints</p>
    </div>
    <div class="stat-card">
      <h2 id="resolvedCount">0</h2>
      <p>Resolved</p>
    </div>
  </div>
</section>

<!-- NOTICES -->
<section class="section dark-section">
  <h2>📢 Latest Notices</h2>
  <div id="noticeContainer"></div>
</section>

<!-- GALLERY -->
<section class="section">
