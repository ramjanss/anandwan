<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ग्रामपंचायत वंधली</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins','Noto Sans Devanagari',sans-serif;
  background:#f5f7fb;
  color:#222;
}

.hero{
  background:linear-gradient(135deg,#0066ff,#00c6ff);
  color:white;
  padding:80px 20px;
  text-align:center;
}

.hero h1{
  font-size:40px;
  margin:0;
}

.hero p{
  opacity:0.9;
  margin:10px 0 30px;
}

.btn{
  background:white;
  color:#0066ff;
  padding:12px 24px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  margin:5px;
  display:inline-block;
  transition:0.3s;
}

.btn:hover{
  background:#e8f0ff;
}

.section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  flex:1;
  min-width:220px;
  text-align:center;
}

.card h2{
  margin:0;
  font-size:32px;
  color:#0066ff;
}

.notice-card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  margin-bottom:15px;
}

.gallery{
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
}

.gallery img{
  width:260px;
  height:170px;
  object-fit:cover;
  border-radius:15px;
}

footer{
  background:#111;
  color:#ccc;
  padding:30px;
  text-align:center;
}
</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ग्रामपंचायत वंधली</h1>
  <p>Smart • Transparent • Digital Governance</p>

  <a href="complaint.html" class="btn">तक्रार नोंदवा</a>
  <a href="track.html" class="btn">तक्रार ट्रॅक करा</a>
  <a href="login.html" class="btn">Admin Login</a>
</section>

<!-- STATS -->
<section class="section">
  <h2>📊 Live Transparency</h2>
  <div class="cards">
    <div class="card">
      <h2 id="noticeCount">0</h2>
      <p>Notices</p>
    </div>
    <div class="card">
      <h2 id="complaintCount">0</h2>
      <p>Total Complaints</p>
    </div>
    <div class="card">
      <h2 id="resolvedCount">0</h2>
      <p>Resolved</p>
    </div>
  </div>
</section>

<!-- NOTICES -->
<section class="section">
  <h2>📢 Latest Notices</h2>
  <div id="noticeContainer"></div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>📸 Village Gallery</h2>
  <div id="galleryContainer" class="gallery"></div>
</section>

<footer>
  © 2026 Gram Panchayat Wandhali • Digital Smart Portal
</footer>

<script type="module" src="js/main.js"></script>

</body>
</html>
