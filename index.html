<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gram Panchayat Wandhali | Official Digital Governance Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
  --primary:#1e3a8a;
  --accent:#15803d;
  --light:#f5f7fb;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Noto Sans', sans-serif;
  color:var(--text);
  background:#fff;
}

/* ================= TOP STRIP ================= */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  font-weight:500;
  border-bottom:1px solid #ddd;
}

/* ================= HEADER ================= */
.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.gov-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:110px;
}

.gp-marathi{
  font-size:18px;
  margin:0;
}

.gp-english{
  font-family:'Noto Serif', serif;
  font-size:34px;
  font-weight:700;
  margin:6px 0;
}

.district-line{
  font-size:15px;
  margin:0;
}

.gov-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.mh-logo{ height:80px; }
.digital-logo{ height:65px; }

/* ================= NAVBAR ================= */
.gov-navbar{
  background:#e9e9e9;
  border-bottom:1px solid #d5d5d5;
  position:relative;
  z-index:1000;
}

.nav-container{
  max-width:1200px;
  margin:auto;
}

.nav-menu{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
}

.nav-menu > li{
  position:relative;
}

.nav-menu > li > a{
  display:block;
  padding:15px 20px;
  text-decoration:none;
  color:#222;
  font-size:15px;
  font-weight:500;
}

.nav-menu > li > a:hover{
  background:#dcdcdc;
}

/* ===== FULL WIDTH MEGA MENU ===== */
.mega-dropdown:hover .mega-menu{
  display:block;
}

.mega-menu{
  display:none;
  position:absolute;
  left:0;
  top:100%;
  width:100vw;
  background:#fff;
  padding:40px 60px;
  border-top:2px solid var(--primary);
  box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.mega-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  gap:80px;
}

.mega-column{
  display:flex;
  flex-direction:column;
}

.mega-column h4{
  font-family:'Noto Serif', serif;
  margin-bottom:10px;
  color:var(--primary);
}

.mega-column a{
  text-decoration:none;
  color:#444;
  margin-bottom:6px;
  font-size:14px;
}

.mega-column a:hover{
  color:var(--primary);
}

/* ================= HERO SLIDER ================= */
.gov-hero{
  width:100%;
  height:500px;
  overflow:hidden;
  position:relative;
}

.hero-slider{
  display:flex;
  height:100%;
  transition:transform 1s ease-in-out;
}

.hero-slide{
  min-width:100%;
  height:100%;
}

.hero-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= WHAT'S NEW ================= */
.gov-divider{
  height:50px;
  background:#f3a617;
}

.whats-new-bar{
  display:flex;
  align-items:center;
  background:#f3a617;
  padding:10px 0;
  overflow:hidden;
}

.whats-label{
  font-weight:600;
  padding:0 20px;
}

.whats-scroll{
  flex:1;
  overflow:hidden;
}

.whats-scroll-content{
  display:inline-block;
  white-space:nowrap;
  animation: scrollNews 25s linear infinite;
}

.whats-scroll a{
  margin-right:60px;
  text-decoration:none;
  color:#000;
}

.whats-scroll:hover .whats-scroll-content{
  animation-play-state: paused;
}

@keyframes scrollNews{
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* ================= SECTIONS ================= */
.section{
  padding:90px 20px;
  max-width:1200px;
  margin:auto;
}

.section h2{
  text-align:center;
  margin-bottom:50px;
  color:var(--primary);
}

/* ================= DASHBOARD ================= */
.dashboard-grid{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.dashboard-card{
  width:220px;
  padding:25px;
  background:#f9fafb;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.dashboard-card h3{
  margin:0;
  font-size:26px;
  color:var(--primary);
}

/* ================= LEADERSHIP ================= */
.leadership-section{
  background:#f8fafc;
}

#leaderContainer,
#bodyContainer,
#employeeContainer{
  display:grid;
  gap:30px;
  margin-top:30px;
}

#leaderContainer{ grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); }
#bodyContainer{ grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }
#employeeContainer{ grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); }

.leader-card{
  background:white;
  border-radius:10px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
  border:1px solid #e5e7eb;
  transition:0.2s ease;
}

.leader-card:hover{
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.leader-photo{
  width:70px;
  height:70px;
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
}

#leaderContainer .leader-photo{
  width:90px;
  height:90px;
}

.leader-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.leader-info h4{
  margin:0;
  font-size:16px;
}

.leader-info p{
  margin:3px 0 0;
  font-size:13px;
  color:#555;
}

/* ================= EVENTS ================= */
.events-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.event-card{
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
}

.event-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
}

/* ================= SCHEMES ================= */
.scheme-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

/* ================= GALLERY ================= */
.gallery-wrapper{
  overflow:hidden;
  margin-top:40px;
}

.gallery-track{
  display:flex;
  gap:20px;
  width:max-content;
  animation: scrollGallery 35s linear infinite;
}

.gallery-track img{
  height:180px;
  border-radius:12px;
  transition:0.4s ease;
  cursor:pointer;
}

.gallery-track img:hover{
  transform:scale(1.08);
}

.gallery-wrapper:hover .gallery-track{
  animation-play-state: paused;
}

@keyframes scrollGallery{
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ================= FOOTER ================= */
footer{
  background:var(--primary);
  color:white;
  padding:30px;
  text-align:center;
}

</style>
</head>
<body>

<div class="gov-top-strip">
  महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA
</div>

<header class="gov-header">
<div class="gov-header-container">
<div class="gov-left">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>
<div>
<p class="gp-marathi">ग्रामपंचायत वंधली | तालुका वरोरा | जिल्हा चंद्रपूर</p>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
<p class="district-line">Taluka Warora | District Chandrapur</p>
</div>
</div>
<div class="gov-right">
<img src="assets/maharashtra-logo.png" class="mh-logo">
<img src="assets/digital-india.png" class="digital-logo">
</div>
</div>
</header>

<!-- HERO -->
<section class="gov-hero">
<div class="hero-slider" id="heroSlider">
<div class="hero-slide"><img src="assets/slide1.jpg"></div>
<div class="hero-slide"><img src="assets/slide2.jpg"></div>
<div class="hero-slide"><img src="assets/slide3.jpg"></div>
</div>
</section>

<div class="gov-divider"></div>

<footer>
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script>
/* HERO SLIDER */
const slider = document.getElementById("heroSlider");
const slides = document.querySelectorAll(".hero-slide").length;
let index = 0;
setInterval(()=>{
index = (index+1) % slides;
slider.style.transform = `translateX(-${index*100}%)`;
},4000);

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
